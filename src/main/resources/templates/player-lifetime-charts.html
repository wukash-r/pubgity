<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
>
<head>
    <meta charset="UTF-8">
    <title th:text="'Pubgity - ' + ${player.playerName} + ' · Lifetime Charts'">Lifetime Charts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

<div th:replace="~{fragments/nav :: nav}"></div>

<main class="max-w-screen-xl mx-auto px-4 py-8 space-y-6">
    <div class="flex items-center justify-between">
        <div>
            <a th:href="@{/players/{id}(id=${player.accountId})}"
               class="inline-flex items-center gap-1 text-gray-400 hover:text-gray-200 text-sm mb-2 transition-colors">
                ← Back to <span th:text="${player.playerName}" class="text-gray-200"></span>
            </a>
            <h1 class="text-2xl font-bold text-white">
                Lifetime Charts
                <span class="text-gray-400 font-normal text-lg ml-2" th:text="${player.playerName}"></span>
            </h1>
            <p class="text-xs text-gray-500 mt-1">Each point is one match. Range = all participants.
                <span class="text-orange-400 font-medium">Orange line = player's lifetime snapshot at time of match.</span>
            </p>
        </div>
        <a th:href="@{/players/{id}/charts/season(id=${player.accountId})}"
           class="px-3 py-2 bg-violet-700 hover:bg-violet-600 text-white text-sm rounded transition-colors">
            Season Charts →
        </a>
    </div>

    <div th:if="${#lists.isEmpty(perMatchStats)}"
         class="bg-gray-800 border border-gray-700 rounded-lg px-5 py-8 text-center text-gray-500">
        No per-match stats available yet. Load some matches first.
    </div>

    <div th:if="${!#lists.isEmpty(perMatchStats)}" class="space-y-6">
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-5"><canvas id="matchKillsChart"></canvas></div>
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-5"><canvas id="matchDamageChart"></canvas></div>
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-5"><canvas id="matchDmgPerRoundLifetimeChart"></canvas></div>
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-5"><canvas id="matchDmgPerRoundModeChart"></canvas></div>
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-5"><canvas id="matchDmgPerMinuteLifetimeChart"></canvas></div>
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-5"><canvas id="matchDmgPerMinuteModeChart"></canvas></div>
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-5"><canvas id="matchKDChart"></canvas></div>
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-5"><canvas id="matchTimeSurvivedChart"></canvas></div>
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-5"><canvas id="matchWinsChart"></canvas></div>
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-5"><canvas id="matchRoundsChart"></canvas></div>
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-5"><canvas id="matchHSKillsChart"></canvas></div>
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-5"><canvas id="matchTop10sChart"></canvas></div>
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-5"><canvas id="matchBestRankChart"></canvas></div>
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-5"><canvas id="matchRankedCountChart"></canvas></div>
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-5"><canvas id="matchParticipantsChart"></canvas></div>
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-5"><canvas id="matchBotsChart"></canvas></div>
    </div>
</main>

<script th:if="${!#lists.isEmpty(perMatchStats)}" th:inline="javascript">
    // ── Dark mode global defaults ──────────────────────────────
    Chart.defaults.color = '#9ca3af';
    Chart.defaults.borderColor = 'rgba(75,85,99,0.35)';
    Chart.defaults.plugins.tooltip.backgroundColor = 'rgba(15,23,42,0.95)';
    Chart.defaults.plugins.tooltip.titleColor = '#f1f5f9';
    Chart.defaults.plugins.tooltip.bodyColor = '#cbd5e1';
    Chart.defaults.plugins.tooltip.borderColor = 'rgba(100,116,139,0.5)';
    Chart.defaults.plugins.tooltip.borderWidth = 1;
    Chart.defaults.scale.grid.color = 'rgba(75,85,99,0.3)';
    Chart.defaults.scale.ticks.color = '#9ca3af';
    Chart.defaults.layout.padding = { right: 24 };

    // mode + map on axis; full label (date · mode · map) still shown in tooltip title
    const xTickOpts = {
        callback: (val, i) => {
            const p = (labels[i] || '').split(' - ');
            return p.length >= 3 ? p[1] + ' ' + p[2] : val;
        },
        color: '#9ca3af', maxRotation: 45, minRotation: 45
    };

    const labels = /*[[${perMatchStats.![label]}]]*/ [];

    const minKills = /*[[${perMatchStats.![minKills]}]]*/ [];
    const maxKills = /*[[${perMatchStats.![maxKills]}]]*/ [];
    const medianKills = /*[[${perMatchStats.![medianKills]}]]*/ [];
    const avgKills = /*[[${perMatchStats.![avgKills]}]]*/ [];

    const minDamage = /*[[${perMatchStats.![minDamage]}]]*/ [];
    const maxDamage = /*[[${perMatchStats.![maxDamage]}]]*/ [];
    const medianDamage = /*[[${perMatchStats.![medianDamage]}]]*/ [];
    const avgDamage = /*[[${perMatchStats.![avgDamage]}]]*/ [];

    const minDmgPerRoundLifetime = /*[[${perMatchStats.![minDmgPerRoundLifetime]}]]*/ [];
    const maxDmgPerRoundLifetime = /*[[${perMatchStats.![maxDmgPerRoundLifetime]}]]*/ [];
    const medianDmgPerRoundLifetime = /*[[${perMatchStats.![medianDmgPerRoundLifetime]}]]*/ [];
    const avgDmgPerRoundLifetime = /*[[${perMatchStats.![avgDmgPerRoundLifetime]}]]*/ [];

    const minDmgPerRoundMode = /*[[${perMatchStats.![minDmgPerRoundMode]}]]*/ [];
    const maxDmgPerRoundMode = /*[[${perMatchStats.![maxDmgPerRoundMode]}]]*/ [];
    const medianDmgPerRoundMode = /*[[${perMatchStats.![medianDmgPerRoundMode]}]]*/ [];
    const avgDmgPerRoundMode = /*[[${perMatchStats.![avgDmgPerRoundMode]}]]*/ [];

    const minDmgPerMinuteLifetime = /*[[${perMatchStats.![minDmgPerMinuteLifetime]}]]*/ [];
    const maxDmgPerMinuteLifetime = /*[[${perMatchStats.![maxDmgPerMinuteLifetime]}]]*/ [];
    const medianDmgPerMinuteLifetime = /*[[${perMatchStats.![medianDmgPerMinuteLifetime]}]]*/ [];
    const avgDmgPerMinuteLifetime = /*[[${perMatchStats.![avgDmgPerMinuteLifetime]}]]*/ [];

    const minDmgPerMinuteMode = /*[[${perMatchStats.![minDmgPerMinuteMode]}]]*/ [];
    const maxDmgPerMinuteMode = /*[[${perMatchStats.![maxDmgPerMinuteMode]}]]*/ [];
    const medianDmgPerMinuteMode = /*[[${perMatchStats.![medianDmgPerMinuteMode]}]]*/ [];
    const avgDmgPerMinuteMode = /*[[${perMatchStats.![avgDmgPerMinuteMode]}]]*/ [];

    const minKD = /*[[${perMatchStats.![minKD]}]]*/ [];
    const maxKD = /*[[${perMatchStats.![maxKD]}]]*/ [];
    const medianKD = /*[[${perMatchStats.![medianKD]}]]*/ [];
    const avgKD = /*[[${perMatchStats.![avgKD]}]]*/ [];

    const participantCounts = /*[[${perMatchStats.![participantCount]}]]*/ [];
    const botCounts = /*[[${perMatchStats.![botCount]}]]*/ [];

    const minBRP = /*[[${perMatchStats.![minBestRankPoint]}]]*/ [];
    const maxBRP = /*[[${perMatchStats.![maxBestRankPoint]}]]*/ [];
    const medianBRP = /*[[${perMatchStats.![medianBestRankPoint]}]]*/ [];
    const avgBRP = /*[[${perMatchStats.![avgBestRankPoint]}]]*/ [];
    const rankedCounts = /*[[${perMatchStats.![rankedPlayerCount]}]]*/ [];

    const playerKills = /*[[${perMatchStats.![playerSnapshotKills]}]]*/ [];
    const playerDamage = /*[[${perMatchStats.![playerSnapshotDamage]}]]*/ [];
    const playerKD = /*[[${perMatchStats.![playerSnapshotKD]}]]*/ [];
    const playerBRP = /*[[${perMatchStats.![playerSnapshotBestRankPoint]}]]*/ [];
    const playerDmgPerRoundLifetime = /*[[${perMatchStats.![playerSnapshotDmgPerRoundLifetime]}]]*/ [];
    const playerDmgPerRoundMode = /*[[${perMatchStats.![playerSnapshotDmgPerRoundMode]}]]*/ [];
    const playerDmgPerMinuteLifetime = /*[[${perMatchStats.![playerSnapshotDmgPerMinuteLifetime]}]]*/ [];
    const playerDmgPerMinuteMode = /*[[${perMatchStats.![playerSnapshotDmgPerMinuteMode]}]]*/ [];

    const rangeStyle = (color) => ({
        borderColor: color, backgroundColor: color.replace('1)', '0.12)'),
        fill: '+1', tension: 0.2, borderWidth: 1, pointRadius: 2
    });
    const solidStyle = (color) => ({borderColor: color, fill: false, tension: 0.2, borderWidth: 2, pointRadius: 2});
    const dashStyle  = (color) => ({borderColor: color, fill: false, tension: 0.2, borderWidth: 2, borderDash: [5,5], pointRadius: 2});
    const playerStyle = {
        borderColor: 'rgba(249,115,22,1)', fill: false, tension: 0.2,
        borderWidth: 3, pointRadius: 4, pointBackgroundColor: 'rgba(249,115,22,1)'
    };

    function mkLine(id, datasets, title) {
        return new Chart(document.getElementById(id), {
            type: 'line',
            data: {labels, datasets},
            options: {responsive: true, plugins: {title: {display: true, text: title, color: '#e5e7eb'}},
                scales: {x: {ticks: xTickOpts}}}
        });
    }
    function mkBar(id, datasets, title) {
        return new Chart(document.getElementById(id), {
            type: 'bar',
            data: {labels, datasets},
            options: {responsive: true, scales: {y: {ticks: {stepSize: 1}}, x: {ticks: xTickOpts}},
                plugins: {title: {display: true, text: title, color: '#e5e7eb'}}}
        });
    }

    function hiddenLine(id, ds, title) {
        const c = mkLine(id, ds, title);
        c.getDatasetMeta(0).hidden = true;
        c.getDatasetMeta(1).hidden = true;
        c.update();
        return c;
    }

    hiddenLine('matchKillsChart', [
        {label:'Min', data:minKills, ...rangeStyle('rgba(56,189,248,1)')},
        {label:'Max', data:maxKills, ...rangeStyle('rgba(56,189,248,1)'), fill:false},
        {label:'Median', data:medianKills, ...solidStyle('rgba(56,189,248,1)')},
        {label:'Avg', data:avgKills, ...dashStyle('rgba(251,113,133,1)')},
        {label:'Player (snapshot)', data:playerKills, ...playerStyle}
    ], 'Participant Lifetime Kills (all modes)');

    hiddenLine('matchDamageChart', [
        {label:'Min', data:minDamage, ...rangeStyle('rgba(52,211,153,1)')},
        {label:'Max', data:maxDamage, ...rangeStyle('rgba(52,211,153,1)'), fill:false},
        {label:'Median', data:medianDamage, ...solidStyle('rgba(52,211,153,1)')},
        {label:'Avg', data:avgDamage, ...dashStyle('rgba(251,191,36,1)')},
        {label:'Player (snapshot)', data:playerDamage, ...playerStyle}
    ], 'Participant Lifetime Damage (all modes)');

    hiddenLine('matchDmgPerRoundLifetimeChart', [
        {label:'Min', data:minDmgPerRoundLifetime, ...rangeStyle('rgba(56,189,248,1)')},
        {label:'Max', data:maxDmgPerRoundLifetime, ...rangeStyle('rgba(56,189,248,1)'), fill:false},
        {label:'Median', data:medianDmgPerRoundLifetime, ...solidStyle('rgba(56,189,248,1)')},
        {label:'Avg', data:avgDmgPerRoundLifetime, ...dashStyle('rgba(251,191,36,1)')},
        {label:'Player (snapshot)', data:playerDmgPerRoundLifetime, ...playerStyle}
    ], 'Damage per Round (lifetime)');

    hiddenLine('matchDmgPerRoundModeChart', [
        {label:'Min', data:minDmgPerRoundMode, ...rangeStyle('rgba(167,139,250,1)')},
        {label:'Max', data:maxDmgPerRoundMode, ...rangeStyle('rgba(167,139,250,1)'), fill:false},
        {label:'Median', data:medianDmgPerRoundMode, ...solidStyle('rgba(167,139,250,1)')},
        {label:'Avg', data:avgDmgPerRoundMode, ...dashStyle('rgba(253,224,71,1)')},
        {label:'Player (snapshot)', data:playerDmgPerRoundMode, ...playerStyle}
    ], 'Damage per Round (match mode)');

    hiddenLine('matchDmgPerMinuteLifetimeChart', [
        {label:'Min', data:minDmgPerMinuteLifetime, ...rangeStyle('rgba(52,211,153,1)')},
        {label:'Max', data:maxDmgPerMinuteLifetime, ...rangeStyle('rgba(52,211,153,1)'), fill:false},
        {label:'Median', data:medianDmgPerMinuteLifetime, ...solidStyle('rgba(52,211,153,1)')},
        {label:'Avg', data:avgDmgPerMinuteLifetime, ...dashStyle('rgba(251,113,133,1)')},
        {label:'Player (snapshot)', data:playerDmgPerMinuteLifetime, ...playerStyle}
    ], 'Damage per Minute (lifetime)');

    hiddenLine('matchDmgPerMinuteModeChart', [
        {label:'Min', data:minDmgPerMinuteMode, ...rangeStyle('rgba(251,113,133,1)')},
        {label:'Max', data:maxDmgPerMinuteMode, ...rangeStyle('rgba(251,113,133,1)'), fill:false},
        {label:'Median', data:medianDmgPerMinuteMode, ...solidStyle('rgba(251,113,133,1)')},
        {label:'Avg', data:avgDmgPerMinuteMode, ...dashStyle('rgba(56,189,248,1)')},
        {label:'Player (snapshot)', data:playerDmgPerMinuteMode, ...playerStyle}
    ], 'Damage per Minute (match mode)');

    hiddenLine('matchKDChart', [
        {label:'Min', data:minKD, ...rangeStyle('rgba(167,139,250,1)')},
        {label:'Max', data:maxKD, ...rangeStyle('rgba(167,139,250,1)'), fill:false},
        {label:'Median', data:medianKD, ...solidStyle('rgba(167,139,250,1)')},
        {label:'Avg', data:avgKD, ...dashStyle('rgba(253,224,71,1)')},
        {label:'Player (snapshot)', data:playerKD, ...playerStyle}
    ], 'Participant K/D Ratio (match mode)');

    hiddenLine('matchTimeSurvivedChart', [
        {label:'Min', data:/*[[${perMatchStats.![minTimeSurvived]}]]*/ [], ...rangeStyle('rgba(253,224,71,1)')},
        {label:'Max', data:/*[[${perMatchStats.![maxTimeSurvived]}]]*/ [], ...rangeStyle('rgba(253,224,71,1)'), fill:false},
        {label:'Median', data:/*[[${perMatchStats.![medianTimeSurvived]}]]*/ [], ...solidStyle('rgba(253,224,71,1)')},
        {label:'Avg', data:/*[[${perMatchStats.![avgTimeSurvived]}]]*/ [], ...dashStyle('rgba(52,211,153,1)')},
        {label:'Player (snapshot)', data:/*[[${perMatchStats.![playerSnapshotTimeSurvived]}]]*/ [], ...playerStyle}
    ], 'Participant Time Survived (match mode)');

    hiddenLine('matchWinsChart', [
        {label:'Min', data:/*[[${perMatchStats.![minWins]}]]*/ [], ...rangeStyle('rgba(52,211,153,1)')},
        {label:'Max', data:/*[[${perMatchStats.![maxWins]}]]*/ [], ...rangeStyle('rgba(52,211,153,1)'), fill:false},
        {label:'Median', data:/*[[${perMatchStats.![medianWins]}]]*/ [], ...solidStyle('rgba(52,211,153,1)')},
        {label:'Avg', data:/*[[${perMatchStats.![avgWins]}]]*/ [], ...dashStyle('rgba(251,191,36,1)')},
        {label:'Player (snapshot)', data:/*[[${perMatchStats.![playerSnapshotWins]}]]*/ [], ...playerStyle}
    ], 'Participant Wins (match mode)');

    hiddenLine('matchRoundsChart', [
        {label:'Min', data:/*[[${perMatchStats.![minRoundsPlayed]}]]*/ [], ...rangeStyle('rgba(167,139,250,1)')},
        {label:'Max', data:/*[[${perMatchStats.![maxRoundsPlayed]}]]*/ [], ...rangeStyle('rgba(167,139,250,1)'), fill:false},
        {label:'Median', data:/*[[${perMatchStats.![medianRoundsPlayed]}]]*/ [], ...solidStyle('rgba(167,139,250,1)')},
        {label:'Avg', data:/*[[${perMatchStats.![avgRoundsPlayed]}]]*/ [], ...dashStyle('rgba(253,224,71,1)')},
        {label:'Player (snapshot)', data:/*[[${perMatchStats.![playerSnapshotRoundsPlayed]}]]*/ [], ...playerStyle}
    ], 'Participant Rounds Played (match mode)');

    hiddenLine('matchHSKillsChart', [
        {label:'Min', data:/*[[${perMatchStats.![minHeadshotKills]}]]*/ [], ...rangeStyle('rgba(251,113,133,1)')},
        {label:'Max', data:/*[[${perMatchStats.![maxHeadshotKills]}]]*/ [], ...rangeStyle('rgba(251,113,133,1)'), fill:false},
        {label:'Median', data:/*[[${perMatchStats.![medianHeadshotKills]}]]*/ [], ...solidStyle('rgba(251,113,133,1)')},
        {label:'Avg', data:/*[[${perMatchStats.![avgHeadshotKills]}]]*/ [], ...dashStyle('rgba(56,189,248,1)')},
        {label:'Player (snapshot)', data:/*[[${perMatchStats.![playerSnapshotHeadshotKills]}]]*/ [], ...playerStyle}
    ], 'Participant Headshot Kills (match mode)');

    hiddenLine('matchTop10sChart', [
        {label:'Min', data:/*[[${perMatchStats.![minTop10s]}]]*/ [], ...rangeStyle('rgba(167,139,250,1)')},
        {label:'Max', data:/*[[${perMatchStats.![maxTop10s]}]]*/ [], ...rangeStyle('rgba(167,139,250,1)'), fill:false},
        {label:'Median', data:/*[[${perMatchStats.![medianTop10s]}]]*/ [], ...solidStyle('rgba(167,139,250,1)')},
        {label:'Avg', data:/*[[${perMatchStats.![avgTop10s]}]]*/ [], ...dashStyle('rgba(253,224,71,1)')},
        {label:'Player (snapshot)', data:/*[[${perMatchStats.![playerSnapshotTop10s]}]]*/ [], ...playerStyle}
    ], 'Participant Top 10s (match mode)');

    hiddenLine('matchBestRankChart', [
        {label:'Min', data:minBRP, ...rangeStyle('rgba(20,184,166,1)')},
        {label:'Max', data:maxBRP, ...rangeStyle('rgba(20,184,166,1)'), fill:false},
        {label:'Median', data:medianBRP, ...solidStyle('rgba(20,184,166,1)')},
        {label:'Avg', data:avgBRP, ...dashStyle('rgba(251,191,36,1)')},
        {label:'Player (snapshot)', data:playerBRP, ...playerStyle}
    ], 'Best Rank Point (non-zero only)');

    mkBar('matchRankedCountChart', [{label:'Ranked Players (BRP > 0)', data:rankedCounts, backgroundColor:'rgba(20,184,166,0.5)', borderColor:'rgba(20,184,166,1)', borderWidth:1}], 'Players with Non-Zero Best Rank Point');
    mkBar('matchParticipantsChart', [{label:'Participants with Stats', data:participantCounts, backgroundColor:'rgba(56,189,248,0.5)', borderColor:'rgba(56,189,248,1)', borderWidth:1}], 'Participants with Lifetime Stats per Match');
    mkBar('matchBotsChart', [{label:'Bots', data:botCounts, backgroundColor:'rgba(251,113,133,0.5)', borderColor:'rgba(251,113,133,1)', borderWidth:1}], 'Bots per Match');
</script>
</body>
</html>
