<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="nav"
     class="sticky top-0 z-50 bg-gray-900 shadow-[0_1px_20px_rgba(0,0,0,0.6)] px-8 h-16
            flex items-center gap-8">

    <!-- Left: Logo -->
    <a href="/players" class="flex items-center gap-3 flex-shrink-0">
        <span class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-violet-600
                     flex items-center justify-center text-base font-bold text-white select-none">P</span>
        <span class="text-white font-semibold text-base tracking-tight">Pubgity</span>
    </a>

    <!-- Nav links (left of center, right of logo) -->
    <div class="flex items-center gap-1 flex-1">
        <a href="/players"
           class="px-4 py-2 text-gray-400 hover:text-white hover:bg-white/10 text-base font-medium rounded-lg transition-colors">
            Home
        </a>
        <a th:if="${isAdmin}" href="/jobs"
           class="px-4 py-2 text-gray-400 hover:text-white hover:bg-white/10 text-base font-medium rounded-lg transition-colors">
            Import
        </a>
    </div>

    <!-- Right: Auth -->
    <div class="flex items-center gap-3 flex-shrink-0">
        <span th:if="${isAuthenticated}" th:text="${username}"
              class="text-gray-500 text-sm hidden sm:inline"></span>
        <form th:if="${isAuthenticated}" method="post" th:action="@{/logout}" class="inline">
            <button type="submit"
                    class="px-4 py-2 text-sm text-gray-300 hover:text-white border border-white/15
                           hover:border-white/30 rounded-lg transition-colors cursor-pointer bg-transparent">
                Sign out
            </button>
        </form>
        <a th:unless="${isAuthenticated}" href="/login"
           class="px-4 py-2 text-sm text-white bg-white/10 hover:bg-white/15
                  border border-white/15 hover:border-white/25 rounded-lg transition-colors">
            Sign in
        </a>
    </div>
</nav>
</body>
</html>
