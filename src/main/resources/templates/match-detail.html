<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'Pubgity - Match ' + ${match.matchId}">Match Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <a th:href="@{/players/{id}(id=${player.accountId})}" class="btn btn-outline-secondary btn-sm mb-3">
        &larr; Back to <span th:text="${player.playerName}"></span>
    </a>

    <h1>Match Detail</h1>
    <p class="text-muted">
        <small th:text="'Match ID: ' + ${match.matchId}"></small><br>
        <small th:text="'Date: ' + ${match.createdAt}"></small><br>
        <small th:text="'Mode: ' + ${match.gameMode} + ' | Map: ' + ${match.mapName} + ' | Duration: ' + ${match.duration} + 's'"></small><br>
        <small th:text="${#lists.size(participants)} + ' participants with lifetime stats | ' + ${match.botCount} + ' bots'"></small>
    </p>

    <div class="table-responsive">
        <table class="table table-sm table-striped">
            <thead>
            <tr>
                <th>#</th>
                <th>Player</th>
                <th>Place Taken</th>
                <th>Kills (all)</th>
                <th>Damage (all)</th>
                <th>K/D (mode)</th>
                <th>Wins (mode)</th>
                <th>Rounds (mode)</th>
                <th>HS Kills (mode)</th>
                <th>Top 10s (all)</th>
                <th>Time Survived (all)</th>
                <th>Best Rank Point</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p, stat : ${participants}"
                th:classappend="${p.accountId == player.accountId ? 'table-primary' : ''}">
                <td th:text="${stat.index + 1}"></td>
                <td>
                    <a th:if="${p.accountId != player.accountId}"
                       th:href="@{/players/{id}(id=${p.accountId})}"
                       th:text="${p.playerName}"></a>
                    <strong th:if="${p.accountId == player.accountId}" th:text="${p.playerName}"></strong>
                </td>
                <td th:text="${p.placeTaken}"></td>
                <td th:text="${p.kills}"></td>
                <td th:text="${#numbers.formatDecimal(p.damage, 1, 0)}"></td>
                <td th:text="${#numbers.formatDecimal(p.kd, 1, 2)}"></td>
                <td th:text="${p.wins}"></td>
                <td th:text="${p.roundsPlayed}"></td>
                <td th:text="${p.headshotKills}"></td>
                <td th:text="${p.top10s}"></td>
                <td th:text="${#numbers.formatDecimal(p.timeSurvived / 3600, 1, 1)} + 'h'"></td>
                <td th:text="${#numbers.formatDecimal(p.bestRankPoint, 1, 0)}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <p th:if="${#lists.isEmpty(participants)}" class="text-muted">No participant stats available for this match.</p>
</div>
</body>
</html>
