<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pubgity - Players</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>PUBG Player Stats</h1>

    <!-- Filter -->
    <form method="get" th:action="@{/players}" class="row g-2 mb-4">
        <div class="col-auto">
            <input type="text" name="filter" class="form-control" placeholder="Search player name..."
                   th:value="${filter}">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Search</button>
        </div>
        <div class="col-auto">
            <a href="/players" class="btn btn-outline-secondary">Clear</a>
        </div>
    </form>

    <!-- Player List -->
    <div class="list-group">
        <a th:each="player : ${players}"
           th:href="@{/players/{id}(id=${player.accountId})}"
           class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
            <span th:text="${player.playerName}"></span>
            <span class="badge bg-primary rounded-pill"
                  th:text="${player.lifetimeStats != null ? 'Stats available' : 'No stats'}"></span>
        </a>
    </div>

    <p th:if="${#lists.isEmpty(players)}" class="text-muted mt-3">
        No players found. <span th:if="${filter != null && !filter.isEmpty()}">Try a different search.</span>
    </p>
</div>
</body>
</html>
