<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pubgity - User Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

<div th:replace="~{fragments/nav :: nav}"></div>

<main class="max-w-screen-xl mx-auto px-4 py-8 space-y-8">
    <div class="flex flex-wrap items-end justify-between gap-3">
        <h1 class="text-3xl font-bold text-white">User Management</h1>
        <p class="text-sm text-gray-500">
            Roles are managed in
            <a href="http://localhost:8090" target="_blank"
               class="text-blue-400 hover:text-blue-300 underline">Keycloak</a>
            and synced here on every login.
        </p>
    </div>

    <div th:if="${#lists.isEmpty(users)}" class="text-gray-500">No users registered yet.</div>

    <!-- User cards -->
    <div th:each="user : ${users}"
         class="bg-gray-800 border border-gray-700 rounded-lg p-5 space-y-5">

        <!-- User header -->
        <div class="flex flex-wrap items-start justify-between gap-3">
            <div>
                <div class="flex items-center gap-2 flex-wrap">
                    <span class="font-semibold text-white text-lg" th:text="${user.username}">username</span>
                    <!-- One badge per Keycloak realm role — read-only -->
                    <span th:each="r : ${user.roles}"
                          class="px-2 py-0.5 rounded-full text-xs font-semibold"
                          th:classappend="${r.name() == 'ADMIN'    ? 'bg-violet-700 text-white' :
                                           (r.name() == 'MODERATOR' ? 'bg-blue-700 text-white' :
                                                                       'bg-gray-700 text-gray-300')}"
                          th:text="${r}">ROLE</span>
                    <span class="text-xs text-gray-600 italic">(synced from Keycloak)</span>
                </div>
                <div class="text-gray-500 text-sm mt-0.5" th:text="${user.email}"></div>
                <div class="text-gray-600 text-xs font-mono mt-0.5" th:text="${'sub: ' + user.sub}"></div>
            </div>
        </div>

        <!-- Moderator constraints (shown when the user holds the MODERATOR role) -->
        <div th:if="${user.roles.contains(T(org.traanite.pubgity.user.AppRole).MODERATOR)}" class="border-t border-gray-700 pt-4">
            <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Moderator Constraints</h3>
            <form method="post" th:action="@{/admin/users/{id}/moderator-constraints(id=${user.id})}"
                  class="space-y-3">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="flex items-center gap-3">
                    <label class="text-sm text-gray-400 w-32">Max queue size</label>
                    <input type="number" name="maxQueueSize" min="1" max="50"
                           th:value="${user.moderatorConstraints?.maxQueueSize ?: 5}"
                           class="w-20 bg-gray-700 border border-gray-600 text-gray-200 text-sm rounded px-2 py-1
                                  focus:outline-none focus:border-blue-500">
                </div>

                <div>
                    <label class="text-sm text-gray-400 block mb-2">Allowed players</label>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2 max-h-48 overflow-y-auto
                                bg-gray-900/50 border border-gray-700 rounded p-3">
                        <label th:each="player : ${players}"
                               class="flex items-center gap-2 text-sm text-gray-300 cursor-pointer hover:text-white">
                            <input type="checkbox" name="allowedPlayerIds"
                                   th:value="${player.id}"
                                   th:checked="${user.moderatorConstraints?.allowedPlayerIds?.contains(player.id) ?: false}"
                                   class="accent-blue-500">
                            <span th:text="${player.playerName}">Player</span>
                        </label>
                    </div>
                    <p th:if="${#lists.isEmpty(players)}" class="text-gray-600 text-xs mt-1">No tracked players yet.</p>
                </div>

                <button type="submit"
                        class="px-4 py-2 bg-gray-600 hover:bg-gray-500 text-white text-sm rounded transition-colors">
                    Save Constraints
                </button>
            </form>
        </div>

    </div>
</main>
</body>
</html>
