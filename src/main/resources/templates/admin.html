<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pubgity Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Pubgity Admin</h1>
    <a href="/players" class="btn btn-outline-secondary btn-sm mb-3">View Public Player List</a>

    <!-- Add Player -->
    <div class="card mb-4">
        <div class="card-header">Add Player to Watchlist</div>
        <div class="card-body">
            <form method="post" th:action="@{/admin/players/add}" class="row g-2">
                <div class="col-auto">
                    <input type="text" name="playerName" class="form-control" placeholder="Player name" required>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">Add</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Player List -->
    <div class="card mb-4">
        <div class="card-header">Tracked Players</div>
        <div class="card-body">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Account ID</th>
                    <th>Last Updated</th>
                    <th>Matches</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="player : ${players}">
                    <td th:text="${player.playerName}"></td>
                    <td>
                        <small th:text="${player.accountId != null ? player.accountId : 'Not resolved'}"
                               th:class="${player.accountId == null ? 'text-muted' : ''}"></small>
                    </td>
                    <td>
                        <span th:if="${player.lastUpdated != null}" th:text="${player.lastUpdated}"></span>
                        <span th:if="${player.lastUpdated == null}" class="text-muted">Never</span>
                    </td>
                    <td th:text="${player.matchIds.size()}"></td>
                    <td>
                        <form method="post" th:action="@{/admin/players/{id}/update(id=${player.id})}"
                              style="display:inline">
                            <button type="submit" class="btn btn-sm btn-success">Update</button>
                        </form>
                        <form method="post" th:action="@{/admin/players/{id}/remove(id=${player.id})}"
                              style="display:inline">
                            <button type="submit" class="btn btn-sm btn-danger"
                                    onclick="return confirm('Remove this player?')">Remove
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
            <p th:if="${#lists.isEmpty(players)}" class="text-muted">No players tracked yet.</p>
        </div>
    </div>

    <!-- Job Queue -->
    <div class="card mb-4">
        <div class="card-header">Job Queue</div>
        <div class="card-body">
            <table class="table table-sm">
                <thead>
                <tr>
                    <th>Player</th>
                    <th>Status</th>
                    <th>Progress</th>
                    <th>Created</th>
                    <th>Started</th>
                    <th>Completed</th>
                    <th>Error</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="job : ${jobs}" th:classappend="${job.status.name() == 'FAILED' ? 'table-danger' :
                    (job.status.name() == 'RUNNING' ? 'table-info' :
                    (job.status.name() == 'COMPLETED' ? 'table-success' : ''))}">
                    <td th:text="${job.playerName}"></td>
                    <td><span class="badge"
                              th:classappend="${job.status.name() == 'QUEUED' ? 'bg-secondary' :
                              (job.status.name() == 'RUNNING' ? 'bg-primary' :
                              (job.status.name() == 'COMPLETED' ? 'bg-success' : 'bg-danger'))}"
                              th:text="${job.status}"></span></td>
                    <td><small th:text="${job.progress}"></small></td>
                    <td><small th:text="${job.createdAt}"></small></td>
                    <td><small th:text="${job.startedAt}"></small></td>
                    <td><small th:text="${job.completedAt}"></small></td>
                    <td><small th:text="${job.errorMessage}" class="text-danger"></small></td>
                </tr>
                </tbody>
            </table>
            <p th:if="${#lists.isEmpty(jobs)}" class="text-muted">No jobs yet.</p>
        </div>
    </div>

    <a href="/logout" class="btn btn-outline-dark btn-sm">Logout</a>
</div>
</body>
</html>
