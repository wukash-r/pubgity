spring:
  application:
    name: pubgity
  security:
    user: # todo
      name: admin
      password: admin
      roles: ADMIN
  mongodb:
    uri: mongodb://user:password@localhost:27017
    database: pubgity
  task:
    scheduling:
      pool:
        size: 5
pubg:
  api:
    key: pubgApiKey
    base-url: https://api.pubg.com/shards/steam
    endpoints:
      players: /players
      matches: /matches/{matchId}
      seasons: /seasons
      season-stats: /players/{accountId}/seasons/{seasonId}
      lifetime-stats: /players/{accountId}/seasons/lifetime
    rate-limit:
      limit-for-period: 10
      limit-refresh-period: 60s
      timeout-duration: 2m
    retry:
      max-attempts: 3
      backoff: 30s
    match-cache:
      max-size: 500
      ttl: 1h
  player:
    stats-ttl: 7d
  season:
    updateSeasonsCron: 0 0 0 * * ? # every day at midnight
